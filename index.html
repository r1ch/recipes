---
layout: mealie
---
<div id="meal-app" v-cloak class="nest-container">
  <aside class="controls-column">
    <h2 class="app-title">Recipe Book</h2>
    
    <div class="filter-status" v-if="searchQuery || currentProtein">
      <span>Filtering by:</span>
      <span class="active-badge" v-if="searchQuery">Search: [[ searchQuery ]]</span>
      <span class="active-badge" v-if="currentProtein">Protein: [[ currentProtein ]]</span>
      <button class="btn-clear" @click="clearAllFilters">Clear All</button>
    </div>
    <div class="filter-status no-filter" v-else>
      Showing all recipes
    </div>

    <h3 class="section-subtitle">Proteins</h3>
    <div class="protein-filter">
      <button 
        v-for="protein in proteins" 
        :key="protein"
        :class="{ active: currentProtein === protein }"
        @click="toggleProtein(protein)"
      >
        [[ protein ]]
      </button>
    </div>

    <h3 class="section-subtitle">Search Keyboard</h3>
    <div class="search-display-container">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          class="search-input" 
          v-model="searchQuery" 
          placeholder="Type to search..."
          readonly
        />
        <button 
          v-if="searchQuery" 
          class="search-clear-btn" 
          @click="clearSearch"
          title="Clear search"
        >
          &times;
        </button>
      </div>
    </div>

    <div class="custom-keyboard">
      <div 
        v-for="(row, rowIndex) in keyboardRows" 
        :key="rowIndex" 
        class="keyboard-row"
      >
        <button 
          v-for="key in row" 
          :key="key"
          :class="[
            'key-btn', 
            key.toLowerCase(), 
            { 
              'action-key': ['space', 'backspace', 'clear'].includes(key.toLowerCase()),
              'space-key': key === 'SPACE',
              'backspace-key': key === 'BACKSPACE',
              'clear-key': key === 'CLEAR'
            }
          ]"
          :disabled="isKeyDisabled(key)"
          @click="handleKeyPress(key)"
        >
          <template v-if="key === 'BACKSPACE'">
            <span class="key-icon">⌫</span>
          </template>
          <template v-else-if="key === 'SPACE'">
            <span class="key-text">Space</span>
          </template>
          <template v-else-if="key === 'CLEAR'">
            <span class="key-text">Clear</span>
          </template>
          <template v-else>
            [[ key ]]
          </template>
        </button>
      </div>
    </div>
  </aside>

  <main class="list-column">
    <ul class="meal-list" :class="{ 'empty-list': filteredMeals.length === 0 }">
      <li v-for="meal in filteredMeals" :key="meal.title" class="meal-item">
        <a :href="getAbsoluteUrl(meal.link)" class="meal-card">
          <span class="meal-title" v-html="highlightMatch(meal.title)"></span>
        </a>
      </li>
      <li v-if="filteredMeals.length === 0" class="no-meals-msg">
        <p>No meals found matching the selected criteria.</p>
        <button class="btn-clear large" @click="clearAllFilters">Reset Filters</button>
      </li>
    </ul>
  </main>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
  const jekyllMeals = [
    {% for meal in site.data.mealie %}
      {
        "title": {{ meal.title | jsonify }},
        "link": {{ meal.link | jsonify }},
        "protein": {{ meal.protein | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  const { createApp, ref, computed } = Vue;
  const app = createApp({
    setup() {
      const meals = ref(jekyllMeals);
      const searchQuery = ref('');
      const currentProtein = ref('');
      
      const keyboardRows = [
        ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
        ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
        ['Z', 'X', 'C', 'V', 'B', 'N', 'M'],
        ['SPACE', 'BACKSPACE', 'CLEAR']
      ];
      // Dynamically extract unique protein values from the meals list
      const proteins = computed(() => {
        const set = new Set();
        meals.value.forEach(meal => {
          if (meal.protein) {
            set.add(meal.protein);
          }
        });
        return Array.from(set).sort();
      });
      


      const getUrlBase = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const queryBase = urlParams.get('url_base');
        if (queryBase) return queryBase;

        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        return pathSegments[0] || 'default-base'; 
      };
      
      const urlBase = getUrlBase();

      const getAbsoluteUrl = (link) => {
        const cleanLink = link.startsWith('/') ? link.substring(1) : link;
        return `https://${urlBase}/${cleanLink}`;
      };



      // Combined Computed Filter
      const filteredMeals = computed(() => {
        let result = meals.value;

        // Apply Search Query Filter
        if (searchQuery.value) {
          const queryLower = searchQuery.value.toLowerCase();
          result = result.filter(meal => 
            meal.title.toLowerCase().includes(queryLower)
          );
        }

        // Apply Protein Filter
        if (currentProtein.value) {
          result = result.filter(meal => 
            meal.protein === currentProtein.value
          );
        }



        return result;
      });

      const isKeyDisabled = (key) => {
        const query = searchQuery.value;
        
        if (key === 'BACKSPACE' || key === 'CLEAR') {
          return query.length === 0;
        }

        let nextQuery = query.toLowerCase();
        if (key === 'SPACE') {
          if (query.length === 0) return true;
          if (query.endsWith(' ')) return true;
          nextQuery += ' ';
        } else {
          nextQuery += key.toLowerCase();
        }

        const activeProtein = currentProtein.value;
        
        return !meals.value.some(meal => {
          if (activeProtein && meal.protein !== activeProtein) {
            return false;
          }
          return meal.title.toLowerCase().includes(nextQuery);
        });
      };

      const handleKeyPress = (key) => {
        if (key === 'BACKSPACE') {
          searchQuery.value = searchQuery.value.slice(0, -1);
        } else if (key === 'CLEAR') {
          searchQuery.value = '';
        } else if (key === 'SPACE') {
          if (!isKeyDisabled('SPACE')) {
            searchQuery.value += ' ';
          }
        } else {
          if (!isKeyDisabled(key)) {
            searchQuery.value += key;
          }
        }
      };

      const clearSearch = () => {
        searchQuery.value = '';
      };

      const toggleProtein = (protein) => {
        currentProtein.value = currentProtein.value === protein ? '' : protein;
      };

      const clearAllFilters = () => {
        searchQuery.value = '';
        currentProtein.value = '';
      };

      const highlightMatch = (title) => {
        const query = searchQuery.value.trim();
        if (!query) return title;
        const escapedQuery = query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        const regex = new RegExp(`(${escapedQuery})`, 'gi');
        return title.replace(regex, '<mark class="match-highlight">$1</mark>');
      };

      return {
        keyboardRows,
        proteins,
        searchQuery,
        currentProtein,
        filteredMeals,
        handleKeyPress,
        clearSearch,
        toggleProtein,
        clearAllFilters,
        getAbsoluteUrl,

        isKeyDisabled,
        highlightMatch
      };
    }
  });

  app.config.compilerOptions.delimiters = ['[[', ']]'];  
  app.mount('#meal-app');
</script>

<style>
  [v-cloak] { display: none; }

  /* Base Setup & Smart Display Optimization */
  .nest-container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f8f9fa;
    color: #202124;
    box-sizing: border-box;
    height: 100vh;
    max-height: 100vh;
    padding: 20px;
    overflow: hidden;
  }

  /* Left Column Styling */
  .controls-column {
    display: flex;
    flex-direction: column;
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  .app-title {
    margin: 0 0 10px 0;
    font-size: 24px;
    font-weight: 600;
    color: #1a73e8;
  }

  .section-subtitle {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #5f6368;
    margin: 15px 0 8px 0;
    font-weight: 600;
  }

  .filter-status {
    font-size: 14px;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  
  .filter-status.no-filter {
    color: #5f6368;
    font-style: italic;
  }

  .active-badge {
    background: #e8f0fe;
    color: #1a73e8;
    padding: 4px 8px;
    border-radius: 8px;
    font-weight: 600;
  }

  .btn-clear {
    background: #f1f3f4;
    border: none;
    color: #3c4043;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-clear:active { background: #e8eaed; }

  /* Protein Filter Layout */
  .protein-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .protein-filter button {
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #dadce0;
    background: #fff;
    border-radius: 20px;
    color: #3c4043;
    transition: all 0.1s ease;
  }

  .protein-filter button.active {
    background: #e6f4ea;
    color: #137333;
    border-color: #137333;
  }

  /* Search input container */
  .search-display-container {
    margin-bottom: 15px;
  }

  .search-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: #f1f3f4;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 8px 12px;
    transition: all 0.2s ease;
  }

  .search-input-wrapper:focus-within,
  .search-input-wrapper.active-focus {
    border-color: #1a73e8;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.15);
  }

  .search-icon {
    font-size: 16px;
    color: #5f6368;
    margin-right: 8px;
    user-select: none;
  }

  .search-input {
    border: none;
    background: transparent;
    font-size: 16px;
    color: #202124;
    width: 100%;
    outline: none;
    font-weight: 500;
    pointer-events: none; /* Make it read-only and no cursor on click */
  }

  .search-clear-btn {
    border: none;
    background: none;
    font-size: 20px;
    color: #5f6368;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    transition: background 0.1s ease;
  }

  .search-clear-btn:hover {
    background: rgba(0, 0, 0, 0.05);
    color: #202124;
  }

  /* Custom keyboard layout */
  .custom-keyboard {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #f1f3f4;
    padding: 12px;
    border-radius: 16px;
    border: 1px solid #e0e0e0;
  }

  .keyboard-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    width: 100%;
  }

  .key-btn {
    flex: 1;
    min-width: 0;
    height: 42px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: #ffffff;
    border-radius: 6px;
    color: #3c4043;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 0 #dadce0;
    transition: transform 0.05s ease, box-shadow 0.05s ease, background-color 0.1s ease;
    user-select: none;
  }

  .key-btn:hover:not(:disabled) {
    background: #f8f9fa;
  }

  .key-btn:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 0 0 #dadce0;
  }

  .key-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
    background: #e8eaed;
    box-shadow: 0 2px 0 #dadce0;
  }

  /* Action keys customization */
  .key-btn.action-key {
    background: #dadce0;
    box-shadow: 0 2px 0 #bdc1c6;
    color: #3c4043;
    font-size: 14px;
    text-transform: uppercase;
  }

  .key-btn.action-key:hover:not(:disabled) {
    background: #e8eaed;
  }

  .key-btn.space-key {
    flex: 2.5;
  }

  .key-btn.backspace-key {
    flex: 1.5;
  }

  .key-btn.clear-key {
    flex: 1.5;
  }

  .key-icon {
    font-size: 18px;
  }

  .key-text {
    font-size: 12px;
    font-weight: 700;
  }

  /* Match Highlight style */
  .match-highlight {
    background-color: rgba(26, 115, 232, 0.15); /* Light blue highlight matching theme */
    color: #1a73e8; /* Darker blue text */
    padding: 0 2px;
    border-radius: 4px;
    font-weight: 600;
  }

  /* Right Column (List) Styling */
  .list-column {
    overflow-y: auto;
    height: 100%;
    padding-right: 4px;
  }

  .meal-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Recipe Card Layout */
  .meal-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    padding: 20px 24px;
    border-radius: 16px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    border: 1px solid transparent;
    transition: transform 0.1s ease, border-color 0.1s ease;
  }

  .meal-card:active {
    transform: scale(0.99);
    background: #fdfdfd;
    border-color: #dadce0;
  }

  .meal-title {
    font-size: 20px;
    font-weight: 500;
    color: #202124;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 15px;
  }



  /* Empty State View */
  .meal-list.empty-list {
    height: 100%;
    justify-content: center;
  }

  .no-meals-msg {
    text-align: center;
    color: #5f6368;
    font-size: 20px;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .btn-clear.large {
    margin-top: 15px;
    padding: 12px 24px;
    font-size: 16px;
    background: #1a73e8;
    color: white;
  }

  /* Standard Web Fallback/Responsive tweak if screen is narrow */
  @media (max-width: 768px) {
    .nest-container {
      grid-template-columns: 1fr;
      height: auto;
      max-height: none;
      overflow: visible;
    }
    .list-column { overflow: visible; }
    .custom-keyboard {
      max-width: 500px;
      margin: 0 auto 15px auto;
      width: 100%;
    }
  }
</style>
