---
layout: mealie
---
<div id="meal-app" v-cloak class="nest-container">
  <aside class="controls-column">
    <h2 class="app-title">Recipe Book</h2>
    
    <div class="filter-status" v-if="currentFilter || currentProtein">
      <span>Filtering by:</span>
      <span class="active-badge" v-if="currentFilter">Letter: [[ currentFilter ]]</span>
      <span class="active-badge" v-if="currentProtein">Protein: [[ currentProtein ]]</span>
      <button class="btn-clear" @click="clearAllFilters">Clear All</button>
    </div>
    <div class="filter-status no-filter" v-else>
      Showing all recipes
    </div>

    <h3 class="section-subtitle">Proteins</h3>
    <div class="protein-filter">
      <button 
        v-for="protein in proteins" 
        :key="protein"
        :class="{ active: currentProtein === protein }"
        @click="toggleProtein(protein)"
      >
        [[ protein ]]
      </button>
    </div>

    <h3 class="section-subtitle">Alphabet</h3>
    <div class="keyboard-filter">
      <button 
        v-for="letter in alphabet" 
        :key="letter"
        :class="{ active: currentFilter === letter }"
        @click="toggleFilter(letter)"
      >
        [[ letter ]]
      </button>
    </div>
  </aside>

  <main class="list-column">
    <ul class="meal-list" :class="{ 'empty-list': filteredMeals.length === 0 }">
      <li v-for="meal in filteredMeals" :key="meal.title" class="meal-item">
        <a :href="getAbsoluteUrl(meal.link)" @click="setLastClickedCookie(meal.link)" class="meal-card">
          <span class="meal-title">[[ meal.title ]]</span>
          <span v-if="lastClickedLink === meal.link" class="star-badge">★ Last Viewed</span>
        </a>
      </li>
      <li v-if="filteredMeals.length === 0" class="no-meals-msg">
        <p>No meals found matching the selected criteria.</p>
        <button class="btn-clear large" @click="clearAllFilters">Reset Filters</button>
      </li>
    </ul>
  </main>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
  const jekyllMeals = [
    {% for meal in site.data.mealie %}
      {
        "title": {{ meal.title | jsonify }},
        "link": {{ meal.link | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  const { createApp, ref, computed } = Vue;
  const app = createApp({
    setup() {
      const meals = ref(jekyllMeals);
      const currentFilter = ref('');
      const currentProtein = ref('');
      
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const proteins = ['Chicken', 'Salmon', 'Pork', 'Beef', 'Lamb'];
      
      const setCookie = (name, value, hours) => {
        const d = new Date();
        d.setTime(d.getTime() + (hours * 60 * 60 * 1000));
        const expires = "expires=" + d.toUTCString();
        document.cookie = `${name}=${encodeURIComponent(value)};${expires};path=/`;
      };

      const getCookie = (name) => {
        const nameEQ = name + "=";
        const ca = document.cookie.split(';');
        for (let i = 0; i < ca.length; i++) {
          let c = ca[i].trim();
          if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
        }
        return null;
      };

      const lastClickedLink = ref(getCookie('last_clicked_meal'));

      const getUrlBase = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const queryBase = urlParams.get('url_base');
        if (queryBase) return queryBase;

        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        return pathSegments[0] || 'default-base'; 
      };
      
      const urlBase = getUrlBase();

      const getAbsoluteUrl = (link) => {
        const cleanLink = link.startsWith('/') ? link.substring(1) : link;
        return `https://${urlBase}/${cleanLink}`;
      };

      const setLastClickedCookie = (link) => {
        setCookie('last_clicked_meal', link, 1);
        lastClickedLink.value = link;
      };

      // Combined Computed Filter
      const filteredMeals = computed(() => {
        let result = meals.value;

        // Apply Letter Filter
        if (currentFilter.value) {
          result = result.filter(meal => 
            meal.title.trim().toUpperCase().startsWith(currentFilter.value)
          );
        }

        // Apply Protein Filter (checks if title contains the protein phrase)
        if (currentProtein.value) {
          const proteinLower = currentProtein.value.toLowerCase();
          result = result.filter(meal => 
            meal.title.toLowerCase().includes(proteinLower)
          );
        }

        // Sort by Last Clicked
        if (lastClickedLink.value) {
          result = [...result].sort((a, b) => {
            if (a.link === lastClickedLink.value) return -1;
            if (b.link === lastClickedLink.value) return 1;
            return 0;
          });
        }

        return result;
      });

      const toggleFilter = (letter) => {
        currentFilter.value = currentFilter.value === letter ? '' : letter;
      };

      const toggleProtein = (protein) => {
        currentProtein.value = currentProtein.value === protein ? '' : protein;
      };

      const clearAllFilters = () => {
        currentFilter.value = '';
        currentProtein.value = '';
      };

      return {
        alphabet,
        proteins,
        currentFilter,
        currentProtein,
        filteredMeals,
        toggleFilter,
        toggleProtein,
        clearAllFilters,
        getAbsoluteUrl,
        setLastClickedCookie,
        lastClickedLink
      };
    }
  });

  app.config.compilerOptions.delimiters = ['[[', ']]'];  
  app.mount('#meal-app');
</script>

<style>
  [v-cloak] { display: none; }

  /* Base Setup & Smart Display Optimization */
  .nest-container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f8f9fa;
    color: #202124;
    box-sizing: border-box;
    height: 100vh;
    max-height: 100vh;
    padding: 20px;
    overflow: hidden;
  }

  /* Left Column Styling */
  .controls-column {
    display: flex;
    flex-direction: column;
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  .app-title {
    margin: 0 0 10px 0;
    font-size: 24px;
    font-weight: 600;
    color: #1a73e8;
  }

  .section-subtitle {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #5f6368;
    margin: 15px 0 8px 0;
    font-weight: 600;
  }

  .filter-status {
    font-size: 14px;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  
  .filter-status.no-filter {
    color: #5f6368;
    font-style: italic;
  }

  .active-badge {
    background: #e8f0fe;
    color: #1a73e8;
    padding: 4px 8px;
    border-radius: 8px;
    font-weight: 600;
  }

  .btn-clear {
    background: #f1f3f4;
    border: none;
    color: #3c4043;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-clear:active { background: #e8eaed; }

  /* Protein Filter Layout */
  .protein-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .protein-filter button {
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #dadce0;
    background: #fff;
    border-radius: 20px;
    color: #3c4043;
    transition: all 0.1s ease;
  }

  .protein-filter button.active {
    background: #e6f4ea;
    color: #137333;
    border-color: #137333;
  }

  /* Touch-friendly Keyboard Grid */
  .keyboard-filter {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    overflow-y: auto;
    padding-right: 4px;
    flex-grow: 1;
  }

  .keyboard-filter button {
    min-height: 40px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid #dadce0;
    background: #fff;
    border-radius: 8px;
    color: #3c4043;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s ease;
  }

  .keyboard-filter button.active {
    background: #1a73e8;
    color: white;
    border-color: #1a73e8;
    box-shadow: 0 2px 4px rgba(26, 115, 232, 0.3);
  }

  /* Right Column (List) Styling */
  .list-column {
    overflow-y: auto;
    height: 100%;
    padding-right: 4px;
  }

  .meal-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Recipe Card Layout */
  .meal-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    padding: 20px 24px;
    border-radius: 16px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    border: 1px solid transparent;
    transition: transform 0.1s ease, border-color 0.1s ease;
  }

  .meal-card:active {
    transform: scale(0.99);
    background: #fdfdfd;
    border-color: #dadce0;
  }

  .meal-title {
    font-size: 20px;
    font-weight: 500;
    color: #202124;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 15px;
  }

  .star-badge {
    background: #fef7e0;
    color: #b06000;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    border: 1px solid #fde293;
  }

  /* Empty State View */
  .meal-list.empty-list {
    height: 100%;
    justify-content: center;
  }

  .no-meals-msg {
    text-align: center;
    color: #5f6368;
    font-size: 20px;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .btn-clear.large {
    margin-top: 15px;
    padding: 12px 24px;
    font-size: 16px;
    background: #1a73e8;
    color: white;
  }

  /* Standard Web Fallback/Responsive tweak if screen is narrow */
  @media (max-width: 768px) {
    .nest-container {
      grid-template-columns: 1fr;
      height: auto;
      max-height: none;
      overflow: visible;
    }
    .list-column { overflow: visible; }
    .keyboard-filter { grid-template-columns: repeat(7, 1fr); flex-grow: 0; }
  }
</style>
